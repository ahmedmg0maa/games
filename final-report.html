<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>التقرير النهائي</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head><body><main class="container section"><div class="title"><h2>التقرير النهائي</h2><p class="muted">اكتب استنتاجك. النظام لا يكتفي باسم الجاني؛ الدافع والطريقة والدليل الحاسم مهمون.</p></div><section class="glass card" id="report"></section></main><script src="js/cases-data.js"></script><script src="js/app.js"></script><script>
const c=getCase(); const suspects=c.suspects.map(s=>`<option>${s.name}</option>`).join('');
report.innerHTML=`<h1>${c.title}</h1><div class="formgrid"><label>المسؤول<select id="killer"><option value="">اختر</option>${suspects}</select></label><label>الدافع<input id="motive" placeholder="ما الدافع؟"></label><label>طريقة التنفيذ<input id="method" placeholder="كيف حدثت الجريمة؟"></label><label>الدليل الحاسم<input id="key" placeholder="ما التفصيلة التي كشفت الحقيقة؟"></label></div><label>تحليلك الكامل<textarea id="analysis" placeholder="اكتب كيف استبعدت الآخرين وربطت الأدلة..."></textarea></label><div class="actions"><button class="btn primary" onclick="check()">إرسال التقرير</button><a class="btn" href="case.html?id=${c.id}">العودة للملف</a></div><div id="out"></div>`;
function norm(s){return (s||'').trim().toLowerCase().replace(/[أإآ]/g,'ا').replace(/ى/g,'ي')}
function check(){let score=0; if(norm(killer.value)==norm(c.solution.killer))score+=45; ['motive','method','key','analysis'].forEach(id=>{const v=norm(document.getElementById(id).value); if(v.length>20)score+=8; if(v.includes(norm(c.solution.killer).split(' ')[0]))score+=2}); const good=score>=55; out.className='result '+(good?'good':'bad'); out.innerHTML=good?`<h2>تقرير صحيح</h2><p><b>المسؤول:</b> ${c.solution.killer}</p><p><b>الدافع:</b> ${c.solution.motive}</p><p><b>الطريقة:</b> ${c.solution.method}</p><p><b>الدليل الحاسم:</b> ${c.solution.key}</p><p>${c.solution.explanation}</p>`:`<h2>التقرير غير كافٍ</h2><p>هناك خلل في الربط أو الجاني المختار. لا تفتح الحل بعد؛ راجع صفحة التلميحات، وركز على التوقيتات والأدلة التي تعيد تفسير المشهد.</p><a class="btn" href="hints.html?id=${c.id}">افتح التلميحات</a>`;}
</script></body></html>
