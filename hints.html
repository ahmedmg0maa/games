<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>التلميحات</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head><body><main class="container section"><div class="title"><h2>غرفة التلميحات</h2><p class="muted">افتح التلميحات بالتدريج فقط عندما تتعطل. الصفحة منفصلة حتى لا تفسد التحقيق.</p></div><section class="glass card"><label>اختر القضية</label><select id="sel"></select><div id="hints"></div></section></main><script src="js/cases-data.js"></script><script src="js/app.js"></script><script>
sel.innerHTML=CASES.map(c=>`<option value="${c.id}">${c.title} — ${c.level}</option>`).join(''); sel.value=caseId;
function renderHints(){const c=getCase(sel.value); hints.innerHTML=`<h2>${c.title}</h2>`+c.hints.map((h,i)=>`<details class="hintbox"><summary>تلميح ${i+1}</summary><p>${h}</p></details>`).join('')+`<div class="actions"><a class="btn primary" href="case.html?id=${c.id}">العودة للقضية</a></div>`} sel.onchange=renderHints; renderHints();
</script></body></html>
