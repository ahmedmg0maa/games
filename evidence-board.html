<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة الأدلة</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head><body><main class="container section"><div class="title"><h2>لوحة الأدلة</h2><p class="muted">الأدلة التي اخترتها من ملفات القضايا. استخدمها أثناء كتابة التقرير النهائي.</p></div><section class="glass card"><div id="board" class="evidence-board"></div><div class="actions"><button class="btn" onclick="localStorage.removeItem('evidence');renderBoard()">مسح اللوحة</button><a class="btn primary" href="cases.html">العودة للقضايا</a></div></section></main><script src="js/cases-data.js"></script><script src="js/app.js"></script><script>
function renderBoard(){const arr=store.get('evidence',[]); board.innerHTML=arr.length?arr.map((e,i)=>`<div class="doc"><b>${e.title}</b><div class="muted">${e.caseId}</div><button class="btn" onclick="removeEvidence(${i})">حذف</button></div>`).join(''):'<p class="muted">لم تضف أي دليل بعد. افتح قضية وأضف الأدلة المهمة.</p>'} renderBoard();
</script></body></html>
